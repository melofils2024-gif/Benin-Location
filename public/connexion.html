<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — BeninLocation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
<div class="auth-card animate-up">
    <div class="auth-logo">
        <div class="auth-logo-icon">🏠</div>
        <div class="auth-logo-text">Benin<span>Location</span></div>
    </div>
    <h1>Bon retour !</h1>
    <p class="auth-subtitle">Connectez-vous à votre espace personnel</p>

    <form id="loginForm" onsubmit="connecter(event)">
        <div class="form-group">
            <label>📱 Numéro de téléphone <span class="required">*</span></label>
            <input type="tel" id="telephone" placeholder="Ex: 97 00 00 00" required>
        </div>
        <div class="form-group">
            <label>🔒 Mot de passe <span class="required">*</span></label>
            <div style="position:relative">
                <input type="password" id="mot_de_passe" placeholder="Votre mot de passe" required style="padding-right:48px">
                <button type="button" onclick="toggleMdp()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--text-muted)" id="toggleBtn">👁️</button>
            </div>
        </div>
        <div style="text-align:right;margin:-10px 0 18px">
            <a href="oubli.html" style="color:var(--text-muted);font-size:.85rem;text-decoration:none">Mot de passe oublié ?</a>
        </div>
        <div id="erreur" style="display:none;background:#fff5f5;border:1px solid #fecaca;color:#dc2626;padding:12px 16px;border-radius:10px;font-size:.88rem;margin-bottom:16px"></div>
        <button type="submit" class="btn-primary" id="btnConnexion" style="width:100%;padding:15px;font-size:1rem">
            Se connecter
        </button>
    </form>

    <div class="auth-divider"><span>Pas encore de compte ?</span></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <a href="inscription-client.html" class="btn-outline" style="justify-content:center;padding:11px">Client</a>
        <a href="inscription-proprio.html" class="btn-outline" style="justify-content:center;padding:11px">Propriétaire</a>
    </div>
    <div class="auth-links" style="margin-top:16px">
        <a href="index.html">← Retour à l'accueil</a>
    </div>
</div>

<script src="auth.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const redirectUrl = params.get('redirect') || null;
const roleAttendu = params.get('role') || null;

if (Auth.isLoggedIn()) {
    const s = Auth.getSession();
    window.location.href = redirectUrl || (s.role === 'proprio' ? 'espace-proprietaire.html' : 'espace-client.html');
}

function toggleMdp() {
    const inp = document.getElementById('mot_de_passe');
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function connecter(e) {
    e.preventDefault();
    const btn = document.getElementById('btnConnexion');
    const err = document.getElementById('erreur');
    btn.textContent = 'Connexion en cours...';
    btn.disabled = true;
    err.style.display = 'none';

    try {
        const r = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                telephone: document.getElementById('telephone').value,
                mot_de_passe: document.getElementById('mot_de_passe').value
            })
        });
        const data = await r.json();
        if (data.success) {
            Auth.setSession(data);
            if (redirectUrl) { window.location.href = decodeURIComponent(redirectUrl); }
            else { window.location.href = data.role === 'proprio' ? 'espace-proprietaire.html' : 'espace-client.html'; }
        } else {
            err.textContent = data.message || 'Identifiants incorrects.';
            err.style.display = 'block';
            btn.textContent = 'Se connecter';
            btn.disabled = false;
        }
    } catch(ex) {
        err.textContent = 'Erreur de connexion au serveur. Est-il démarré ?';
        err.style.display = 'block';
        btn.textContent = 'Se connecter';
        btn.disabled = false;
    }
}
</script>
</body>
</html>
