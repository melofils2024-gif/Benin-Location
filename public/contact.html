<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacter le Propriétaire — BeninLocation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header">
    <a href="index.html" class="logo">
        <span class="logo-icon">🏠</span>
        <span>Benin<span>Location</span></span>
    </a>
    <nav class="main-nav">
        <a href="#" onclick="history.back()">← Retour</a>
    </nav>
    <div id="nav-user-area"></div>
</header>

<main class="contact-layout">
    <div class="contact-card animate-up">
        <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:8px">✉️ Contacter le propriétaire</h1>
        <p style="color:var(--text-muted);margin-bottom:24px">Envoyez un message direct au propriétaire pour cette annonce.</p>

        <div id="info-chambre" style="background:#f8fafc;padding:16px;border-radius:12px;margin-bottom:24px;border:1px solid var(--border);display:none">
            <!-- Rempli par JS -->
        </div>

        <form id="contactForm" onsubmit="envoyerMessage(event)">
            <!-- Le client connecté n'a plus besoin de saisir son nom/téléphone, on utilise ceux de la session -->
            <div style="background:rgba(39,174,96,0.06);padding:12px 16px;border-radius:8px;border-left:3px solid var(--accent);margin-bottom:20px;font-size:.9rem;color:var(--text-main)">
                Connecté en tant que : <strong id="user-nom">...</strong>
            </div>

            <div class="form-group">
                <label>Votre message <span class="required">*</span></label>
                <textarea id="message" rows="5" placeholder="Bonjour, je suis très intéressé par votre chambre. Quand pourrais-je la visiter ?" required></textarea>
            </div>

            <div id="erreur" style="display:none;background:#fff5f5;border:1px solid #fecaca;color:#dc2626;padding:12px 16px;border-radius:10px;font-size:.88rem;margin-bottom:16px"></div>
            
            <button type="submit" class="btn-primary" id="btnEnvoyer" style="width:100%;padding:14px;font-size:1rem">
                Envoyer le message
            </button>
        </form>

        <div id="succes" class="success-banner">
            ✅ Message envoyé avec succès au propriétaire !<br>
            <span style="font-size:.85rem;font-weight:500;opacity:0.9">Il vous répondra bientôt via votre espace client ou sur WhatsApp.</span>
            <br><br>
            <a href="espace-client.html" class="btn-secondary" style="font-size:.85rem;padding:8px 16px">Aller à mon espace</a>
        </div>
    </div>
</main>

<script src="auth.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const idChambre = params.get('chambre_id');
let proprioZone = '';

window.addEventListener('DOMContentLoaded', async () => {
    // Le client DOIT être connecté pour envoyer un message
    if (!Auth.requireLogin('client')) return;
    
    Auth.updateNav();
    const s = Auth.getSession();
    document.getElementById('user-nom').textContent = s.nom;

    if (!idChambre) {
        document.getElementById('contactForm').style.display = 'none';
        document.getElementById('erreur').textContent = "Chambre non spécifiée. Veuillez retourner à l'annonce.";
        document.getElementById('erreur').style.display = 'block';
        return;
    }

    try {
        const r = await fetch(`/api/chambre/${idChambre}`);
        const c = await r.json();
        proprioZone = c.proprio_zone;
        
        const infoDiv = document.getElementById('info-chambre');
        infoDiv.style.display = 'block';
        infoDiv.innerHTML = `
            <div style="font-size:.85rem;color:var(--text-muted);text-transform:uppercase;font-weight:700">Annonce concernée</div>
            <div style="font-weight:700;font-size:1.1rem;color:var(--primary);margin:4px 0">${c.titre}</div>
            <div style="color:var(--accent);font-weight:600">${Number(c.prix).toLocaleString('fr-FR')} FCFA / mois</div>
            <div style="margin-top:8px;font-size:.9rem">Propriétaire : <strong>${c.proprio_nom} ${c.proprio_prenom}</strong></div>
        `;
    } catch(e) {
        document.getElementById('erreur').textContent = "Erreur lors du chargement des informations du propriétaire.";
        document.getElementById('erreur').style.display = 'block';
    }
});

async function envoyerMessage(e) {
    e.preventDefault();
    const btn = document.getElementById('btnEnvoyer');
    const err = document.getElementById('erreur');
    err.style.display = 'none';

    btn.textContent = 'Envoi en cours...';
    btn.disabled = true;

    try {
        const r = await fetch('/api/envoyer-message', {
            method: 'POST',
            headers: Auth.getHeaders(),
            body: JSON.stringify({
                message: document.getElementById('message').value,
                proprioId: proprioZone,
                chambre_id: idChambre
            })
        });
        const data = await r.json();
        if (data.success) {
            document.getElementById('contactForm').style.display = 'none';
            document.getElementById('succes').classList.add('visible');
        } else {
            err.textContent = data.message || "Erreur d'envoi.";
            err.style.display = 'block';
            btn.textContent = 'Envoyer le message';
            btn.disabled = false;
        }
    } catch(ex) {
        err.textContent = "Erreur de connexion au serveur.";
        err.style.display = 'block';
        btn.textContent = 'Envoyer le message';
        btn.disabled = false;
    }
}
</script>
</body>
</html>
