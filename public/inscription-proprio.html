<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Propriétaire — BeninLocation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
<div class="auth-card animate-up" style="max-width:540px">
    <div class="auth-logo">
        <div class="auth-logo-icon">🏠</div>
        <div class="auth-logo-text">Benin<span>Location</span></div>
    </div>
    <h1>Devenir propriétaire</h1>
    <p class="auth-subtitle">Publiez vos annonces et gérez vos locations en toute simplicité</p>

    <form id="inscriptionForm" onsubmit="sInscrire(event)">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
            <div class="form-group">
                <label>Nom <span class="required">*</span></label>
                <input type="text" id="nom" placeholder="Ex: Agossou" required>
            </div>
            <div class="form-group">
                <label>Prénom <span class="required">*</span></label>
                <input type="text" id="prenom" placeholder="Ex: Jean" required>
            </div>
        </div>

        <div class="form-group">
            <label>Genre</label>
            <select id="sexe">
                <option value="M">Masculin</option>
                <option value="F">Féminin</option>
            </select>
        </div>

        <div class="form-group">
            <label>📱 Numéro de téléphone <span class="required">*</span></label>
            <input type="tel" id="telephone" placeholder="Ex: 97 00 00 00" required>
        </div>

        <div class="form-group">
            <label>💬 Numéro WhatsApp <span class="required">*</span></label>
            <input type="tel" id="whatsapp" placeholder="Ex: 97 00 00 00 (si différent du tél.)">
        </div>

        <div class="form-group">
            <label>📍 Votre zone / localité <span class="required">*</span></label>
            <select id="zone" required>
                <option value="">-- Choisissez votre zone --</option>
                <option value="calavi">Calavi</option>
                <option value="cotonou">Cotonou</option>
                <option value="zogbo">Zogbo</option>
                <option value="kpota">Kpota</option>
                <option value="akpakpa">Akpakpa</option>
                <option value="haie vive">Haie Vive</option>
                <option value="uac">UAC</option>
            </select>
        </div>

        <div class="form-group">
            <label>🔒 Mot de passe <span class="required">*</span></label>
            <input type="password" id="mot_de_passe" placeholder="Min. 6 caractères" required minlength="6">
        </div>

        <div class="form-group">
            <label>🔒 Confirmer le mot de passe <span class="required">*</span></label>
            <input type="password" id="confirmer_mdp" placeholder="Répétez votre mot de passe" required>
        </div>

        <div id="erreur" style="display:none;background:#fff5f5;border:1px solid #fecaca;color:#dc2626;padding:12px 16px;border-radius:10px;font-size:.88rem;margin-bottom:16px"></div>
        <div id="succes" style="display:none;background:#f0fff4;border:1px solid #9ae6b4;color:#276749;padding:12px 16px;border-radius:10px;font-size:.88rem;margin-bottom:16px"></div>

        <button type="submit" class="btn-primary" id="btnInscrire" style="width:100%;padding:15px;font-size:1rem">
            Créer mon compte propriétaire →
        </button>
    </form>

    <div class="auth-links" style="margin-top:20px">
        Déjà inscrit ? <a href="connexion.html">Se connecter</a>
        &nbsp;|&nbsp;
        <a href="index.html">← Accueil</a>
    </div>
</div>

<script src="auth.js"></script>
<script>
if (Auth.isLoggedIn()) window.location.href = 'index.html';

async function sInscrire(e) {
    e.preventDefault();
    const btn = document.getElementById('btnInscrire');
    const err = document.getElementById('erreur');
    const succ = document.getElementById('succes');
    err.style.display = 'none';
    succ.style.display = 'none';

    const mdp = document.getElementById('mot_de_passe').value;
    const conf = document.getElementById('confirmer_mdp').value;
    if (mdp !== conf) {
        err.textContent = 'Les mots de passe ne correspondent pas.';
        err.style.display = 'block';
        return;
    }

    const whatsapp = document.getElementById('whatsapp').value || document.getElementById('telephone').value;

    btn.textContent = 'Inscription en cours...';
    btn.disabled = true;

    try {
        const r = await fetch('/api/inscription-proprio', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nom: document.getElementById('nom').value,
                prenom: document.getElementById('prenom').value,
                sexe: document.getElementById('sexe').value,
                telephone: document.getElementById('telephone').value,
                whatsapp,
                zone: document.getElementById('zone').value,
                mot_de_passe: mdp
            })
        });
        const data = await r.json();
        if (data.success) {
            Auth.setSession(data);
            succ.textContent = '✅ Compte créé avec succès ! Redirection...';
            succ.style.display = 'block';
            setTimeout(() => window.location.href = 'espace-proprietaire.html', 1500);
        } else {
            err.textContent = data.message || 'Erreur lors de l\'inscription.';
            err.style.display = 'block';
            btn.textContent = 'Créer mon compte propriétaire →';
            btn.disabled = false;
        }
    } catch(ex) {
        err.textContent = 'Erreur de connexion au serveur.';
        err.style.display = 'block';
        btn.textContent = 'Créer mon compte propriétaire →';
        btn.disabled = false;
    }
}
</script>
</body>
</html>
